name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install

      - run: pnpm tauri build
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Upload portable binary to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "ReleaseManager-${tag}-portable.exe"
          Copy-Item "src-tauri\target\release\release-manager.exe" $asset
          gh release create $tag $asset `
            --title "Release Manager $tag" `
            --draft `
            --notes ""

      - name: Upload portable binary as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ReleaseManager-portable
          path: src-tauri/target/release/release-manager.exe
